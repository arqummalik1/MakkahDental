name: Feature request
description: Suggest an enhancement or new capability
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / Opportunity
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the change in enough detail to estimate it.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope / Out of scope
      description: What should be included/excluded?
    validations:
      required: false
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0 (blocker)
        - P1 (high)
        - P2 (medium)
        - P3 (low)
    validations:
      required: true
